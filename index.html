<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<title>Konversi Satuan Lengkap</title>

<style>
body {
    font-family: Arial;
    background: linear-gradient(to right, #6a11cb, #2575fc);
    color: white;
    text-align: center;
    padding: 30px;
}

.container {
    background: white;
    color: black;
    padding: 25px;
    border-radius: 15px;
    width: 350px;
    margin: auto;
    box-shadow: 0 10px 25px rgba(0,0,0,0.3);
}

h2 {
    color: #6a11cb;
}

select, input, button {
    width: 90%;
    padding: 10px;
    margin: 10px;
    border-radius: 8px;
}

button {
    background: #6a11cb;
    color: white;
    border: none;
    cursor: pointer;
}

button:hover {
    background: #2575fc;
}

#hasil {
    margin-top: 15px;
    font-weight: bold;
}
</style>

</head>

<body>

<div class="container">
    <h2>Konversi Satuan</h2>

    <select id="jenis">
        <option value="panjang">Panjang</option>
        <option value="berat">Berat</option>
        <option value="suhu">Suhu</option>
        <option value="kapasitansi">Farad (Kapasitansi)</option>
        <option value="resistansi">Ohm (Resistansi)</option>
        <option value="daya">Watt (Daya)</option>
    </select>

    <input type="number" id="nilai" placeholder="Masukkan nilai">

    <button onclick="konversi()">Konversi</button>
    <button onclick="reset()">Reset</button>

    <div id="hasil"></div>
</div>

<script>
function konversi() {
    let jenis = document.getElementById("jenis").value;
    let nilai = parseFloat(document.getElementById("nilai").value);
    let hasil = "";

    if (isNaN(nilai)) {
        hasil = "Masukkan angka yang valid!";
    }

    else if (jenis === "panjang") {
        hasil = "cm: " + (nilai * 100) +
                "<br>km: " + (nilai / 1000);
    }

    else if (jenis === "berat") {
        hasil = "gram: " + (nilai * 1000) +
                "<br>ton: " + (nilai / 1000);
    }

    else if (jenis === "suhu") {
        hasil = "Fahrenheit: " + ((nilai * 9/5) + 32) +
                "<br>Kelvin: " + (nilai + 273);
    }

    // FARAD
    else if (jenis === "kapasitansi") {
        hasil = "mF: " + (nilai * 1000) +
                "<br>µF: " + (nilai * 1000000) +
                "<br>nF: " + (nilai * 1000000000);
    }

    // OHM
    else if (jenis === "resistansi") {
        hasil = "KΩ: " + (nilai / 1000) +
                "<br>MΩ: " + (nilai / 1000000);
    }

    // WATT
    else if (jenis === "daya") {
        hasil = "kW: " + (nilai / 1000) +
                "<br>MW: " + (nilai / 1000000);
    }

    document.getElementById("hasil").innerHTML = hasil;
}

function reset() {
    document.getElementById("nilai").value = "";
    document.getElementById("hasil").innerHTML = "";
}
</script>

</body>
</html>

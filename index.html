<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <title>Konversi Satuan</title>

    <!-- Menghubungkan file CSS -->
    <link rel="stylesheet" href="style.css">
</head>

<body>

<div class="container">
    <h2>Konversi Satuan</h2>

    <!-- Dropdown jenis konversi -->
    <select id="jenis">
        <option value="panjang">Panjang</option>
        <option value="berat">Berat</option>
        <option value="suhu">Suhu</option>
        <option value="kapasitansi">Farad</option>
        <option value="resistansi">Ohm</option>
        <option value="daya">Watt</option>
    </select>

    <!-- Input nilai -->
    <input type="number" id="nilai" placeholder="Masukkan nilai">

    <!-- Tombol -->
    <button onclick="konversi()">Konversi</button>
    <button onclick="resetForm()">Reset</button>

    <!-- Hasil -->
    <div id="hasil"></div>
</div>

<!-- Menghubungkan JavaScript -->
<script src="script.js"></script>

</body>
</html>
